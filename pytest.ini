[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

markers =
    smoke: Quick critical-path checks (login, add to cart, checkout happy path)
    regression: Broader regression coverage
    ui: UI tests driven via Playwright
    api: API tests driven via requests
    negative: Negative/edge-case scenarios (invalid login, locked user, etc.)

addopts =
    --alluredir=allure-results
    --reruns 2
    --reruns-delay 1
    -v
    --tb=short

filterwarnings =
    ignore::DeprecationWarning
